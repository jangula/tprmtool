name: Semgrep

# Static analysis (SAST). Runs free on private repos (no GitHub Advanced
# Security needed). Reports findings in the job log and as a SARIF artifact.
# Non-blocking for now; add `--error` to the scan to gate merges once the
# baseline is clean. Actions are pinned to commit SHAs (Dependabot keeps current).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1' # weekly, Monday 06:00 UTC

permissions:
  contents: read

concurrency:
  group: semgrep-${{ github.ref }}
  cancel-in-progress: true

jobs:
  semgrep:
    name: SAST (semgrep)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'
      - name: Install semgrep
        run: pip install --quiet semgrep
      - name: Scan
        run: |
          semgrep scan \
            --config p/default \
            --config p/typescript \
            --config p/javascript \
            --config p/owasp-top-ten \
            --config p/secrets \
            --metrics off \
            --exclude node_modules --exclude dist --exclude build --exclude .next \
            --sarif --output semgrep.sarif
          python -c "import json; d=json.load(open('semgrep.sarif')); n=sum(len(r.get('results',[])) for r in d.get('runs',[])); print(f'Semgrep findings: {n}')"
      - name: Upload SARIF artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: semgrep-sarif
          path: semgrep.sarif
          if-no-files-found: ignore
